# Cấu hình MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dede_tickets?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dede}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

# Cấu hình Hibernate cho MySQL
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Cổng chạy ứng dụng
server.port=${PORT:8080}

# Upload ảnh sự kiện
app.upload.root-dir=${APP_UPLOAD_ROOT_DIR:uploads}
app.upload.events-dir=${APP_UPLOAD_EVENTS_DIR:uploads/events}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:8MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:16MB}

# Log bảo mật
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.level.org.thymeleaf=${LOGGING_LEVEL_ORG_THYMELEAF:DEBUG}

# Seed / reset dữ liệu demo
app.seed.enabled=${APP_SEED_ENABLED:true}
app.dev.reset-data-on-start=${APP_DEV_RESET_DATA_ON_START:false}
app.demo.full-reseed-on-start=${APP_DEMO_FULL_RESEED_ON_START:false}
app.demo.seed-purchase-history-on-start=${APP_DEMO_SEED_PURCHASE_HISTORY_ON_START:false}

# OTP email via Google Apps Script webhook
app.mail.otp.enabled=${APP_MAIL_OTP_ENABLED:true}
app.mail.otp.script-url=${APP_MAIL_OTP_SCRIPT_URL:https://script.google.com/macros/s/AKfycbxdS_ysUSollYA2LaENfNfaTTHCKGfo31y093yhUjxT2Q7yYecG9aIBfKIId2X_B9mBaQ/exec}
app.mail.otp.secret=${APP_MAIL_OTP_SECRET:020806}
app.mail.otp.expire-minutes=${APP_MAIL_OTP_EXPIRE_MINUTES:5}
app.mail.otp.max-attempts=${APP_MAIL_OTP_MAX_ATTEMPTS:5}
