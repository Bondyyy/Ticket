# Cấu hình Oracle Database
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=DoAnQLDA
spring.datasource.password=123

# Cấu hình Hibernate cho Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Cổng chạy ứng dụng
server.port=8080

# Upload ảnh sự kiện
app.upload.root-dir=uploads
app.upload.events-dir=uploads/events
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=16MB

# Log bảo mật
logging.level.org.springframework.security=INFO
logging.level.org.thymeleaf=DEBUG

# Seed / reset dữ liệu demo
app.seed.enabled=true
app.dev.reset-data-on-start=false

# OTP email via Google Apps Script webhook
app.mail.otp.enabled=true
