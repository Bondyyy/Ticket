<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tài Khoản - Dề Dê Tickets</title>
    <th:block layout:fragment="page-css">
        <link rel="stylesheet" th:href="@{/css/pages/QLTK.css}">
    </th:block>
</head>

<body>
<div layout:fragment="content" class="admin-page">
<!-- ===================== MAIN CONTENT ===================== -->
    <main class="main-content">

        <!-- Header -->
        <header class="main-header">
            <h2><i class="fa-solid fa-users" style="margin-right:8px;color:#3b82f6;"></i>Danh Sách Tài Khoản Hệ Thống</h2>
            <div class="header-right">
                <i class="fa-solid fa-bell" title="Thông báo"></i>
                <span>Hôm nay: <b id="currentDate"></b></span>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area">
            <div class="admin-tabs">
                <a th:href="@{/taikhoan}" class="admin-tab active">Tài khoản</a>
                <a th:href="@{/taikhoan/vai-tro}" class="admin-tab">Vai trò</a>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <form th:action="@{/taikhoan}" method="get" style="display:flex;gap:8px;align-items:center;">
                        <div class="search-wrapper">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" name="keyword" id="searchInput" placeholder="Tìm tên, email..."
                                   th:value="${keyword}">
                        </div>
                        <select name="trangThai" id="statusFilter" class="filter-select">
                            <option value="">Tất cả trạng thái</option>
                            <option value="Đang hoạt động" th:selected="${trangThaiFilter == 'Đang hoạt động'}">Đang hoạt động</option>
                            <option value="Bị khóa" th:selected="${trangThaiFilter == 'Bị khóa'}">Bị khóa</option>
                            <option value="Không hoạt động" th:selected="${trangThaiFilter == 'Không hoạt động'}">Không hoạt động</option>
                        </select>
                        <button type="submit" class="btn-filter">
                            <i class="fa-solid fa-filter"></i> Lọc
                        </button>
                    </form>
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fa-solid fa-plus"></i> Thêm Tài Khoản
                </button>
            </div>

            <!-- Alert -->
            <div th:if="${thanhCong}" class="alert-box alert-success" style="display:block;">
                <i class="fa-solid fa-circle-check"></i> <span th:text="${thanhCong}"></span>
            </div>
            <div th:if="${loi}" class="alert-box alert-warning" style="display:block;">
                <i class="fa-solid fa-triangle-exclamation"></i> <span th:text="${loi}"></span>
            </div>

            <!-- Table Card -->
            <div class="table-card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Mã ND</th>
                                <th>Tài Khoản</th>
                                <th>Email</th>
                                <th>SĐT</th>
                                <th>Giới Tính</th>
                                <th>Vai Trò</th>
                                <th style="text-align:center;">Trạng Thái</th>
                                <th style="text-align:center;">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr th:each="user : ${danhSachTaiKhoan}">
                                <td><b th:text="${user.maND}"></b></td>
                                <td th:text="${user.tenTaiKhoan}"></td>
                                <td th:text="${user.email != null ? user.email : '-'}"></td>
                                <td th:text="${user.sdt != null ? user.sdt : '-'}"></td>
                                <td th:text="${user.gioiTinh != null ? user.gioiTinh : '-'}"></td>
                                <td>
                                    <span th:each="ctv : ${user.chiTietVaiTros}"
                                          th:if="${!#strings.startsWith(ctv.maVaiTro, 'VT')}"
                                          class="badge badge-role"
                                          th:text="${ctv.maVaiTro == 'ADMIN' ? 'Quản trị viên' : (ctv.maVaiTro == 'CUSTOMER' ? 'Khách hàng' : (ctv.maVaiTro == 'STAFF' ? 'Nhân viên soát vé' : (ctv.maVaiTro == 'ORGANIZER' ? 'Ban tổ chức' : (ctv.vaiTro != null ? ctv.vaiTro.tenVaiTro : ctv.maVaiTro))))}"></span>
                                </td>
                                <td style="text-align:center;">
                                    <span th:if="${user.trangThaiND == 'Đang hoạt động'}" class="badge badge-active">Đang hoạt động</span>
                                    <span th:if="${user.trangThaiND == 'Bị khóa'}" class="badge badge-locked">Bị khóa</span>
                                    <span th:if="${user.trangThaiND == 'Không hoạt động'}" class="badge badge-pending">Không hoạt động</span>
                                    <span th:if="${user.trangThaiND != 'Đang hoạt động' and user.trangThaiND != 'Bị khóa' and user.trangThaiND != 'Không hoạt động'}" class="badge badge-pending" th:text="${user.trangThaiND}">Khác</span>
                                </td>
                                <td style="text-align:center;">
                                    <button class="btn-action btn-edit" title="Sửa"
                                            th:data-mand="${user.maND}"
                                            onclick="editUser(this.getAttribute('data-mand'))">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </button>
                                    <form th:action="@{/taikhoan/xoa/{maND}(maND=${user.maND})}" method="post"
                                          style="display:inline;"
                                          onsubmit="return confirm('Bạn có chắc muốn khóa tài khoản này?');">
                                        <button type="submit" class="btn-action btn-lock" title="Khóa">
                                            <i class="fa-solid fa-lock"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(danhSachTaiKhoan)}">
                                <td colspan="8" style="text-align:center;padding:20px;color:#93c5fd;">Không tìm thấy tài khoản nào!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination-bar">
                    <span>Hiển thị <b th:text="${danhSachTaiKhoan != null ? #lists.size(danhSachTaiKhoan) : 0}">0</b> tài khoản</span>
                </div>
            </div>
        </div>
    </main>
<!-- ===================== MODAL THÊM MỚI ===================== -->
<div id="addModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Thêm Tài Khoản Mới</h3>
            <button class="btn-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <form id="addForm" th:action="@{/taikhoan/tao-moi}" method="post" th:object="${taiKhoanMoi}">

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Tên tài khoản <span style="color:red;">*</span></label>
                        <input type="text" th:field="*{tenTaiKhoan}" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu <span style="color:red;">*</span></label>
                        <input type="password" th:field="*{matKhau}" required>
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{sdt}">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Giới tính</label>
                        <select th:field="*{gioiTinh}">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ngày sinh</label>
                        <input type="date" th:field="*{ngaySinh}">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Trạng thái <span style="color:red;">*</span></label>
                        <select th:field="*{trangThaiND}" class="status-select">
                            <option value="Đang hoạt động">Đang hoạt động</option>
                            <option value="Không hoạt động">Không hoạt động</option>
                            <option value="Bị khóa">Bị khóa</option>
                        </select>
                    </div>
                </div>

                <div class="form-group role-section">
                    <label>Vai trò hệ thống</label>
                    <div class="roles-group">
                        <label th:each="vt : ${danhSachVaiTro}">
                            <input type="checkbox" name="danhSachVaiTro" th:value="${vt.maVaiTro}">
                            <span th:text="${vt.maVaiTro == 'ADMIN' ? 'Quản trị viên' : (vt.maVaiTro == 'CUSTOMER' ? 'Khách hàng' : (vt.maVaiTro == 'STAFF' ? 'Nhân viên soát vé' : (vt.maVaiTro == 'ORGANIZER' ? 'Ban tổ chức' : vt.maVaiTro)))}"></span>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Hủy bỏ</button>
                    <button type="submit" class="btn-save">
                        <i class="fa-solid fa-floppy-disk"></i> Lưu Dữ Liệu
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===================== MODAL CẬP NHẬT ===================== -->
<div id="editModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="editModalTitle">Cập Nhật Tài Khoản</h3>
            <button class="btn-close" onclick="closeEditModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <form id="editForm" method="post">

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Tên tài khoản <span style="color:red;">*</span></label>
                        <input type="text" id="edit_tenTaiKhoan" name="tenTaiKhoan" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="edit_matKhau" name="matKhau">
                        <p class="form-hint">Để trống nếu không muốn đổi mật khẩu</p>
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="edit_email" name="email">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" id="edit_sdt" name="sdt">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Giới tính</label>
                        <select id="edit_gioiTinh" name="gioiTinh">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ngày sinh</label>
                        <input type="date" id="edit_ngaySinh" name="ngaySinh">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Trạng thái <span style="color:red;">*</span></label>
                        <select id="edit_trangThaiND" name="trangThaiND" class="status-select">
                            <option value="Đang hoạt động">Đang hoạt động</option>
                            <option value="Không hoạt động">Không hoạt động</option>
                            <option value="Bị khóa">Bị khóa</option>
                        </select>
                    </div>
                </div>

                <div class="form-group role-section">
                    <label>Vai trò hệ thống</label>
                    <div class="roles-group" id="editRolesGroup">
                        <label th:each="vt : ${danhSachVaiTro}">
                            <input type="checkbox" name="danhSachVaiTro" th:value="${vt.maVaiTro}">
                            <span th:text="${vt.maVaiTro == 'ADMIN' ? 'Quản trị viên' : (vt.maVaiTro == 'CUSTOMER' ? 'Khách hàng' : (vt.maVaiTro == 'STAFF' ? 'Nhân viên soát vé' : (vt.maVaiTro == 'ORGANIZER' ? 'Ban tổ chức' : vt.maVaiTro)))}"></span>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Hủy bỏ</button>
                    <button type="submit" class="btn-save">
                        <i class="fa-solid fa-floppy-disk"></i> Cập Nhật
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===================== JAVASCRIPT ===================== -->
<script>
    // Set current date
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('vi-VN');

    // Auto-hide flash messages after 4 seconds
    document.querySelectorAll('.alert-box').forEach(function(el) {
        if (el.style.display === 'block') {
            setTimeout(function() { el.style.display = 'none'; }, 4000);
        }
    });

    // ===== ADD MODAL =====
    function openModal() {
        document.getElementById('addForm').reset();
        document.getElementById('addModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('addModal').classList.remove('open');
    }

    document.getElementById('addModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ===== EDIT MODAL =====
    function closeEditModal() {
        document.getElementById('editModal').classList.remove('open');
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditModal();
    });

    function editUser(maND) {
        // Fetch user data from the API endpoint
        fetch('/taikhoan/api/' + maND)
            .then(function(response) {
                if (!response.ok) throw new Error('Không tìm thấy tài khoản');
                return response.json();
            })
            .then(function(user) {
                // Set form action to the update endpoint
                document.getElementById('editForm').action = '/taikhoan/cap-nhat/' + user.maND;

                // Populate the form fields
                document.getElementById('edit_tenTaiKhoan').value = user.tenTaiKhoan || '';
                document.getElementById('edit_email').value = user.email || '';
                document.getElementById('edit_sdt').value = user.sdt || '';
                document.getElementById('edit_gioiTinh').value = user.gioiTinh || 'Nam';
                document.getElementById('edit_ngaySinh').value = user.ngaySinh || '';
                document.getElementById('edit_trangThaiND').value = user.trangThaiND || 'Đang hoạt động';
                document.getElementById('edit_matKhau').value = '';

                // Set role checkboxes
                var checkboxes = document.querySelectorAll('#editRolesGroup input[type="checkbox"]');
                var userRoles = user.danhSachVaiTro || [];
                checkboxes.forEach(function(cb) {
                    cb.checked = userRoles.indexOf(cb.value) > -1;
                });

                document.getElementById('editModalTitle').innerText = 'Cập Nhật: ' + user.maND;
                document.getElementById('editModal').classList.add('open');
            })
            .catch(function(err) {
                alert('Lỗi: ' + err.message);
            });
    }
</script>
</div>
</body>
</html>
